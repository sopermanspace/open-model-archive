<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tile Merge</title>
  <style>
    :root {
      --gap: 12px;
      --board-size: min(90vw, 400px);
      --cell: calc((var(--board-size) - (5 * var(--gap))) / 4);
      --bg: #faf8ef;
      --text: #776e65;
      --board-bg: #bbada0;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
    }

    header {
      width: var(--board-size);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score-box {
      background: var(--board-bg);
      color: #f9f6f2;
      padding: 6px 14px;
      border-radius: 6px;
      text-align: center;
      min-width: 70px;
    }

    .score-box small {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .score-box .num {
      font-weight: 700;
      font-size: 1.2rem;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
      background: #8f7a66;
      color: #f9f6f2;
      transition: transform 0.1s, background 0.2s;
    }

    button:hover { background: #7f6a56; }
    button:active { transform: scale(0.96); }

    #board {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      background: var(--board-bg);
      border-radius: 8px;
      padding: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      touch-action: none;
    }

    .cell-bg {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 4px;
    }

    .tile {
      position: absolute;
      width: var(--cell);
      height: var(--cell);
      z-index: 1;
      border-radius: 4px;
      transform: translate(
        calc(var(--gap) + var(--x) * (var(--cell) + var(--gap))),
        calc(var(--gap) + var(--y) * (var(--cell) + var(--gap)))
      );
      transition: transform 0.15s ease-in-out;
      will-change: transform;
    }

    .tile-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-weight: 700;
      font-size: clamp(18px, calc(var(--cell) / 2.2), 56px);
      color: #f9f6f2;
      transition: background-color 0.15s, color 0.15s;
    }

    .tile-new .tile-inner { animation: appear 0.2s ease-in-out forwards; }
    .tile-merged .tile-inner { animation: pop 0.2s ease-in-out forwards; }

    @keyframes appear {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Tile colors */
    .tile-2 .tile-inner { background: #eee4da; color: #776e65; }
    .tile-4 .tile-inner { background: #ede0c8; color: #776e65; }
    .tile-8 .tile-inner { background: #f2b179; }
    .tile-16 .tile-inner { background: #f59563; }
    .tile-32 .tile-inner { background: #f67c5f; }
    .tile-64 .tile-inner { background: #f65e3b; }
    .tile-128 .tile-inner { background: #edcf72; box-shadow: 0 0 10px rgba(243, 215, 116, 0.3); }
    .tile-256 .tile-inner { background: #edcc61; box-shadow: 0 0 12px rgba(243, 215, 116, 0.4); }
    .tile-512 .tile-inner { background: #edc850; box-shadow: 0 0 14px rgba(243, 215, 116, 0.5); }
    .tile-1024 .tile-inner { background: #edc53f; box-shadow: 0 0 16px rgba(243, 215, 116, 0.6); font-size: clamp(16px, calc(var(--cell) / 2.6), 46px); }
    .tile-2048 .tile-inner { background: #edc22e; box-shadow: 0 0 18px rgba(243, 215, 116, 0.7); font-size: clamp(16px, calc(var(--cell) / 2.6), 46px); }
    .tile-4096 .tile-inner,
    .tile-8192 .tile-inner,
    .tile-16384 .tile-inner,
    .tile-32768 .tile-inner,
    .tile-65536 .tile-inner { background: #3c3a32; font-size: clamp(13px, calc(var(--cell) / 3), 38px); }

    .controls-hint {
      margin-top: 16px;
      font-size: 0.9rem;
      opacity: 0.75;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(238, 228, 218, 0.88);
      z-index: 10;
      text-align: center;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .overlay.hidden {
      display: none;
      opacity: 0;
      pointer-events: none;
    }

    .overlay-box {
      background: #fff;
      padding: 28px 36px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 90vw;
    }

    .overlay-box h2 {
      margin: 0 0 10px;
      font-size: 2rem;
    }
    .overlay-box p { margin: 0 0 18px; line-height: 1.4; }
    .overlay-box .big-score { font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; }

    .overlay-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="start-screen" class="overlay">
    <div class="overlay-box">
      <h2>Tile Merge</h2>
      <p>Slide numbered tiles across the 4×4 board. When two tiles with the same number touch, they merge into one. Reach the <strong>2048</strong> tile to win.</p>
      <button id="start-btn">Press Space or click to start</button>
    </div>
  </div>

  <div id="win-screen" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <h2>You made 2048!</h2>
      <p>Great job. Want to keep chasing higher tiles?</p>
      <div class="overlay-actions">
        <button id="keep-btn">Keep playing</button>
        <button id="win-new-btn">New game</button>
      </div>
    </div>
  </div>

  <div id="over-screen" class="overlay hidden" role="dialog" aria-modal="true">
    <div class="overlay-box">
      <h2>Game Over</h2>
      <p class="big-score">Final score: <span id="final-score">0</span></p>
      <div class="overlay-actions">
        <button id="try-btn">Try again</button>
      </div>
    </div>
  </div>

  <header>
    <div>
      <h1>Tile Merge</h1>
    </div>
    <div class="scores">
      <div class="score-box">
        <small>Score</small>
        <span id="score" class="num">0</span>
      </div>
      <div class="score-box">
        <small>Best</small>
        <span id="best" class="num">0</span>
      </div>
    </div>
  </header>

  <main>
    <section id="board" aria-label="4 by 4 tile board">
      <!-- Background cells and tiles are rendered by JavaScript -->
    </section>
    <p class="controls-hint">Arrow keys (or swipe) to move</p>
  </main>

  <script>
    (function () {
      const SIZE = 4;
      const boardEl = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const startScreen = document.getElementById('start-screen');
      const winScreen = document.getElementById('win-screen');
      const overScreen = document.getElementById('over-screen');
      const finalScoreEl = document.getElementById('final-score');

      let nextId = 1;
      let state = {
        tiles: [],
        score: 0,
        best: readBest(),
        started: false,
        over: false,
        won: false
      };

      function readBest() {
        try { return parseInt(localStorage.getItem('tileMergeBest'), 10) || 0; } catch (e) { return 0; }
      }
      function writeBest(v) {
        try { localStorage.setItem('tileMergeBest', String(v)); } catch (e) {}
      }

      function updateScores() {
        scoreEl.textContent = state.score;
        bestEl.textContent = state.best;
      }

      function getTileAt(x, y) {
        return state.tiles.find(t => t.x === x && t.y === y);
      }

      function gridValues(tiles) {
        const g = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        (tiles || state.tiles).forEach(t => { g[t.y][t.x] = t.value; });
        return g;
      }

      function gridsEqual(a, b) {
        for (let y = 0; y < SIZE; y++) {
          for (let x = 0; x < SIZE; x++) {
            if (a[y][x] !== b[y][x]) return false;
          }
        }
        return true;
      }

      function spawnTile() {
        const empties = [];
        for (let y = 0; y < SIZE; y++) {
          for (let x = 0; x < SIZE; x++) {
            if (!getTileAt(x, y)) empties.push({ x, y });
          }
        }
        if (!empties.length) return null;
        const spot = empties[Math.floor(Math.random() * empties.length)];
        const value = Math.random() < 0.9 ? 2 : 4;
        const tile = { id: nextId++, x: spot.x, y: spot.y, value, isNew: true, mergedThisTurn: false };
        state.tiles.push(tile);
        return tile;
      }

      function processLine(tiles, coords) {
        const result = [];
        let score = 0;
        const dead = [];
        tiles.forEach(tile => {
          if (!result.length) {
            tile.x = coords[0].x;
            tile.y = coords[0].y;
            result.push(tile);
          } else {
            const last = result[result.length - 1];
            if (!last.mergedThisTurn && last.value === tile.value) {
              const merged = {
                id: nextId++,
                x: last.x,
                y: last.y,
                value: last.value * 2,
                mergedThisTurn: true,
                isNew: false
              };
              score += merged.value;
              dead.push(last.id, tile.id);
              result.pop();
              result.push(merged);
            } else {
              const i = result.length;
              tile.x = coords[i].x;
              tile.y = coords[i].y;
              result.push(tile);
            }
          }
        });
        return { tiles: result, score, dead };
      }

      function buildLines(direction) {
        const lines = [];
        if (direction === 'up') {
          for (let x = 0; x < SIZE; x++) {
            const coords = [];
            for (let y = 0; y < SIZE; y++) coords.push({ x, y });
            const tiles = coords.map(c => getTileAt(c.x, c.y)).filter(Boolean);
            lines.push({ tiles, coords });
          }
        } else if (direction === 'down') {
          for (let x = 0; x < SIZE; x++) {
            const coords = [];
            for (let y = SIZE - 1; y >= 0; y--) coords.push({ x, y });
            const tiles = coords.map(c => getTileAt(c.x, c.y)).filter(Boolean);
            lines.push({ tiles, coords });
          }
        } else if (direction === 'left') {
          for (let y = 0; y < SIZE; y++) {
            const coords = [];
            for (let x = 0; x < SIZE; x++) coords.push({ x, y });
            const tiles = coords.map(c => getTileAt(c.x, c.y)).filter(Boolean);
            lines.push({ tiles, coords });
          }
        } else if (direction === 'right') {
          for (let y = 0; y < SIZE; y++) {
            const coords = [];
            for (let x = SIZE - 1; x >= 0; x--) coords.push({ x, y });
            const tiles = coords.map(c => getTileAt(c.x, c.y)).filter(Boolean);
            lines.push({ tiles, coords });
          }
        }
        return lines;
      }

      function move(direction) {
        if (!state.started || state.over) return;
        const beforeGrid = gridValues();
        let nextTiles = [];
        let moveScore = 0;
        const dead = new Set();
        const lines = buildLines(direction);
        lines.forEach(line => {
          const res = processLine(line.tiles, line.coords);
          nextTiles.push(...res.tiles);
          moveScore += res.score;
          res.dead.forEach(id => dead.add(id));
        });
        const afterGrid = gridValues(nextTiles);
        if (gridsEqual(beforeGrid, afterGrid)) return;

        state.tiles = nextTiles;
        state.score += moveScore;
        if (state.score > state.best) {
          state.best = state.score;
          writeBest(state.best);
        }
        spawnTile();
        checkState();
        render();
        updateScores();
      }

      function checkState() {
        if (isGameOver()) {
          state.over = true;
          finalScoreEl.textContent = state.score;
          overScreen.classList.remove('hidden');
          return;
        }
        if (!state.won && state.tiles.some(t => t.value >= 2048)) {
          state.won = true;
          winScreen.classList.remove('hidden');
        }
      }

      function isGameOver() {
        if (state.tiles.length < SIZE * SIZE) return false;
        for (let y = 0; y < SIZE; y++) {
          for (let x = 0; x < SIZE; x++) {
            const t = getTileAt(x, y);
            const checks = [[1, 0], [0, 1]];
            for (const [dx, dy] of checks) {
              const nx = x + dx, ny = y + dy;
              if (nx < SIZE && ny < SIZE) {
                const n = getTileAt(nx, ny);
                if (n && n.value === t.value) return false;
              }
            }
          }
        }
        return true;
      }

      function render() {
        const existing = {};
        boardEl.querySelectorAll('.tile').forEach(el => { existing[el.dataset.id] = el; });

        state.tiles.forEach(tile => {
          let el = existing[tile.id];
          const valueClass = `tile-${tile.value}`;
          const classes = ['tile', valueClass];
          if (tile.isNew) classes.push('tile-new');
          if (tile.mergedThisTurn) classes.push('tile-merged');

          if (!el) {
            el = document.createElement('div');
            el.dataset.id = tile.id;
            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            el.appendChild(inner);
            boardEl.appendChild(el);
          }
          el.className = classes.join(' ');
          el.style.setProperty('--x', tile.x);
          el.style.setProperty('--y', tile.y);
          el.querySelector('.tile-inner').textContent = tile.value;
        });

        Object.keys(existing).forEach(id => {
          if (!state.tiles.some(t => String(t.id) === id)) {
            existing[id].remove();
          }
        });

        state.tiles.forEach(t => { t.isNew = false; t.mergedThisTurn = false; });
      }

      function initGame() {
        nextId = 1;
        state.tiles = [];
        state.score = 0;
        state.over = false;
        state.won = false;

        boardEl.innerHTML = '';
        for (let i = 0; i < SIZE * SIZE; i++) {
          const bg = document.createElement('div');
          bg.className = 'cell-bg';
          boardEl.appendChild(bg);
        }
        spawnTile();
        spawnTile();
        updateScores();
        render();
      }

      function startGame() {
        startScreen.classList.add('hidden');
        state.started = true;
        initGame();
      }

      function restartGame() {
        winScreen.classList.add('hidden');
        overScreen.classList.add('hidden');
        startScreen.classList.add('hidden');
        state.started = true;
        initGame();
      }

      /* Input */
      document.addEventListener('keydown', e => {
        if (!state.started) {
          if (e.code === 'Space') { e.preventDefault(); startGame(); }
          return;
        }
        const map = {
          ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
          w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right'
        };
        if (map[e.key]) {
          e.preventDefault();
          move(map[e.key]);
        } else if (state.over && e.code === 'Space') {
          e.preventDefault();
          restartGame();
        }
      });

      let touchStart = null;
      boardEl.addEventListener('touchstart', e => {
        touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }, { passive: true });
      boardEl.addEventListener('touchend', e => {
        if (!touchStart) return;
        const dx = e.changedTouches[0].clientX - touchStart.x;
        const dy = e.changedTouches[0].clientY - touchStart.y;
        if (Math.max(Math.abs(dx), Math.abs(dy)) > 20) {
          if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
          else move(dy > 0 ? 'down' : 'up');
        }
        touchStart = null;
      }, { passive: true });

      /* Buttons */
      document.getElementById('start-btn').addEventListener('click', startGame);
      startScreen.addEventListener('click', e => { if (e.target === startScreen) startGame(); });
      document.getElementById('keep-btn').addEventListener('click', () => winScreen.classList.add('hidden'));
      document.getElementById('win-new-btn').addEventListener('click', restartGame);
      document.getElementById('try-btn').addEventListener('click', restartGame);

      updateScores();
    })();
  </script>
</body>
</html>
