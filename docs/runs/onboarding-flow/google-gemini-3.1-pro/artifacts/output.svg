<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 85" width="100%" height="100%">
  <style>
    .icon-stroke { 
      fill: none; 
      stroke: currentColor; 
      stroke-width: 1.5; 
      stroke-linecap: round; 
      stroke-linejoin: round; 
    }
    .label { 
      font-family: system-ui, -apple-system, sans-serif; 
      font-size: 12px; 
      font-weight: 500; 
      text-anchor: middle; 
      fill: currentColor; 
    }
  </style>

  <!-- Background Circles -->
  <g class="icon-stroke">
    <circle cx="50" cy="32" r="22" />
    <circle cx="150" cy="32" r="22" />
    <circle cx="250" cy="32" r="22" />
    <circle cx="350" cy="32" r="22" />
  </g>

  <!-- Connecting Arrows -->
  <g class="icon-stroke">
    <line x1="78" y1="32" x2="122" y2="32" />
    <polyline points="117,27 122,32 117,37" />

    <line x1="178" y1="32" x2="222" y2="32" />
    <polyline points="217,27 222,32 217,37" />

    <line x1="278" y1="32" x2="322" y2="32" />
    <polyline points="317,27 322,32 317,37" />
  </g>

  <!-- Step 1: Sign up (User + Plus) -->
  <g class="icon-stroke">
    <circle cx="48" cy="25" r="4" />
    <path d="M 39,40 c 0,-4 3,-6 9,-6 c 6,0 9,2 9,6" />
    <line x1="56" y1="21" x2="62" y2="21" />
    <line x1="59" y1="18" x2="59" y2="24" />
  </g>

  <!-- Step 2: Connect repo (Link) -->
  <g class="icon-stroke">
    <path d="M 146,26 h -4 a 6,6 0 0,0 0,12 h 4 M 154,26 h 4 a 6,6 0 0,1 0,12 h -4 M 147,32 h 6" />
  </g>

  <!-- Step 3: Run scan (File + Magnifying Glass) -->
  <g class="icon-stroke">
    <path d="M 244,22 h 6 l 4,4 v 12 h -10 z" />
    <circle cx="252" cy="32" r="4" />
    <line x1="254.8" y1="34.8" x2="259" y2="39" />
  </g>

  <!-- Step 4: Get alerts (Bell) -->
  <g class="icon-stroke">
    <path d="M 350,22 v 2 M 345,33 c 0,-5 2,-7 5,-7 c 3,0 5,2 5,7 l 2,3 h -14 z" />
    <path d="M 348,36 a 2,2 0 0,1 4,0" />
  </g>

  <!-- Step Labels -->
  <text x="50" y="72" class="label">Sign up</text>
  <text x="150" y="72" class="label">Connect repo</text>
  <text x="250" y="72" class="label">Run scan</text>
  <text x="350" y="72" class="label">Get alerts</text>
</svg>