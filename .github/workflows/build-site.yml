name: Build Site

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Validate project
        run: uv run oma validate

      - name: Generate site (skip model execution in CI)
        run: uv run oma build --skip-run