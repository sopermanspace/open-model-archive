<svg width="100%" height="100%" viewBox="0 0 450 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Defines the primary connecting color -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:currentColor; stop-opacity:1" />
      <stop offset="100%" style="stop-color:currentColor; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Step 1: Sign up -->
  <g transform="translate(30, 25)">
    <circle cx="0" cy="0" r="12" fill="#ccc" stroke="currentColor" stroke-width="2"/>
    <text x="-25" y="18" font-family="Arial, sans-serif" font-size="14" fill="currentColor">Sign up</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <path d="M 60 30 A 15 15 0 0 1 70 30" fill="none" stroke="currentColor" stroke-width="2"/>

  <!-- Step 2: Connect repo -->
  <g transform="translate(120, 25)">
    <circle cx="0" cy="0" r="12" fill="#ccc" stroke="currentColor" stroke-width="2"/>
    <text x="-60" y="18" font-family="Arial, sans-serif" font-size="14" fill="currentColor">Connect repo</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <path d="M 190 30 A 15 15 0 0 1 200 30" fill="none" stroke="currentColor" stroke-width="2"/>

  <!-- Step 3: Run scan -->
  <g transform="translate(260, 25)">
    <circle cx="0" cy="0" r="12" fill="#ccc" stroke="currentColor" stroke-width="2"/>
    <text x="-100" y="18" font-family="Arial, sans-serif" font-size="14" fill="currentColor">Run scan</text>
  </g>

  <!-- Arrow 3 -> 4 -->
  <path d="M 340 30 A 15 15 0 0 1 350 30" fill="none" stroke="currentColor" stroke-width="2"/>

  <!-- Step 4: Get alerts -->
  <g transform="translate(400, 25)">
    <circle cx="0" cy="0" r="12" fill="#ccc" stroke="currentColor" stroke-width="2"/>
    <text x="-130" y="18" font-family="Arial, sans-serif" font-size="14" fill="currentColor">Get alerts</text>
  </g>

</svg>