  <g fill="currentColor" stroke="none" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle">
    <text x="50" y="58">Sign up</text>
    <text x="150" y="58">Connect repo</text>
    <text x="250" y="58">Run scan</text>
    <text x="350" y="58">Get alerts</text>
  </g>
</svg>