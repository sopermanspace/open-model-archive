<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ site.description }}{% endblock %}">
  <meta name="keywords" content="{% block meta_keywords %}{{ site.keywords }}{% endblock %}">
  <meta name="robots" content="{{ site.robots }}">
  <meta name="author" content="{{ site.author }}">
  <meta name="publisher" content="{{ site.publisher }}">
  <link rel="canonical" href="{{ canonical_url }}{% block canonical_path %}/{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}{{ site.title }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site.description }}{% endblock %}">
  <meta property="og:url" content="{{ canonical_url }}{% block og_path %}/{% endblock %}">
  <meta property="og:site_name" content="{{ site_name }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}{{ site.title }}{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}{{ site.description }}{% endblock %}">
  <link rel="icon" href="{{ site_root }}/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site_root }}/assets/css/main.css">
  {% if api_base_url %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
  {% endif %}
  <script>
    (function () {
      var path = location.pathname;
      if (path.endsWith('/index.html')) {
        history.replaceState(null, '', path.slice(0, -10) + location.search + location.hash);
      }
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body{% if api_base_url %} data-api-base="{{ api_base_url }}"{% endif %}{% if vote_category %} data-vote-category="{{ vote_category }}"{% endif %}>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="{{ site_root }}/">{{ site_name }}</a>
      <nav class="site-nav">
        <a href="{{ site_root }}/">Archive</a>
        <a href="{{ site_root }}/about/">About</a>
        <a href="https://github.com/sopermanspace/open-model-archive" rel="noopener">GitHub</a>
        {% if api_base_url %}
        <button type="button" class="auth-btn" id="oma-signin">Sign in to vote</button>
        <span class="auth-user hidden" id="oma-user"></span>
        <button type="button" class="auth-btn auth-signout hidden" id="oma-signout">Sign out</button>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Open source. Every prompt versioned. Every artifact public.</p>
    </div>
  </footer>
  {% block scripts %}{% endblock %}
  {% if api_base_url %}
  <script src="{{ site_root }}/assets/js/votes.js" defer></script>
  {% endif %}
</body>
</html>
