<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}Open Model Archive — transparent AI model output comparison{% endblock %}">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ root }}/assets/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="{{ root }}/index.html">{{ site_name }}</a>
      <nav class="site-nav">
        <a href="{{ root }}/index.html">Archive</a>
        <a href="{{ root }}/about/index.html">About</a>
        <a href="https://github.com/sopermanspace/open-model-archive" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Open source. Every prompt versioned. Every artifact public.</p>
    </div>
  </footer>
</body>
</html>
