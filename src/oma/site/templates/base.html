<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}Open Model Archive — transparent AI model output comparison{% endblock %}">
  <link rel="canonical" href="{{ canonical_url }}{% block canonical_path %}/{% endblock %}">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <link rel="icon" href="{{ site_root }}/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site_root }}/assets/css/main.css">
  <script>
    (function () {
      var path = location.pathname;
      if (path.endsWith('/index.html')) {
        history.replaceState(null, '', path.slice(0, -10) + location.search + location.hash);
      }
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="{{ site_root }}/">{{ site_name }}</a>
      <nav class="site-nav">
        <a href="{{ site_root }}/">Archive</a>
        <a href="{{ site_root }}/about/">About</a>
        <a href="https://github.com/sopermanspace/open-model-archive" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Open source. Every prompt versioned. Every artifact public.</p>
    </div>
  </footer>
</body>
</html>
